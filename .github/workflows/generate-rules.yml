name: Generate RULE-SET from OpenCCK Lists

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3,15 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

          echo "opencck_base=https://iplist.opencck.org" >> $GITHUB_ENV

          echo "opencck_group_porno=porn" >> $GITHUB_ENV
          echo "opencck_group_discord=discord" >> $GITHUB_ENV
          echo "opencck_group_youtube=youtube" >> $GITHUB_ENV
          echo "opencck_group_socials=socials" >> $GITHUB_ENV
          echo "opencck_group_torrent=torrent" >> $GITHUB_ENV
          echo "opencck_group_tools=tools" >> $GITHUB_ENV
          echo "opencck_group_music=music" >> $GITHUB_ENV
          echo "opencck_group_art=art" >> $GITHUB_ENV
          echo "opencck_group_games=games" >> $GITHUB_ENV
          echo "opencck_group_messengers=messengers" >> $GITHUB_ENV

          echo "antifilter_domains=https://antifilter.download/list/domains.lst" >> $GITHUB_ENV
          echo "antizapret_domains=https://antizapret.prostovpn.org/domains-export.txt" >> $GITHUB_ENV
        shell: bash

      - name: Checkout the main branch
        uses: actions/checkout@v6

      - name: Generate rule files
        shell: bash
        run: |
          set -euo pipefail

          generate_rules_url() {
            local url="$1"
            local output="$2"
            local max_attempts=6
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Generating $output from $url (attempt $attempt/$max_attempts)"
              echo "payload:" > "$output"

              if content="$(curl -fsSL \
                  --connect-timeout 15 --max-time 120 \
                  --retry 8 --retry-all-errors --retry-delay 2 --retry-max-time 180 \
                  -H 'User-Agent: github-actions (rule-set generator)' \
                  "$url")"; then

                echo "$content" | grep -vE '^\s*#' | grep -vE '^\s*$' | while IFS= read -r domain; do
                  if [[ $domain =~ ^www\. ]]; then
                    echo "  - '${domain}'" >> "$output"
                    echo "  - '+.${domain#www.}'" >> "$output"
                  else
                    echo "  - '+.${domain}'" >> "$output"
                  fi
                done

                echo "✅ Success: $output"
                return 0
              else
                echo "❌ curl failed for $output (attempt $attempt/$max_attempts)"
                sleep $((attempt * 3))
                attempt=$((attempt + 1))
              fi
            done

            echo "❌ Failed after $max_attempts attempts: $output"
            return 1
          }

          generate_rules_url_split() {
            local url="$1"
            local output_base="$2"
            local max_attempts=6
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Generating $output_base from $url (attempt $attempt/$max_attempts)"
              local temp_file=$(mktemp)
              
              if content="$(curl -fsSL \
                  --connect-timeout 15 --max-time 300 \
                  --retry 8 --retry-all-errors --retry-delay 2 --retry-max-time 300 \
                  -H 'User-Agent: github-actions (rule-set generator)' \
                  "$url")"; then

                echo "$content" | grep -vE '^\s*#' | grep -vE '^\s*$' | while IFS= read -r domain; do
                  if [[ $domain =~ ^www\. ]]; then
                    echo "  - '${domain}'"
                    echo "  - '+.${domain#www.}'"
                  else
                    echo "  - '+.${domain}'"
                  fi
                done > "$temp_file"
                
                local total_lines=$(wc -l < "$temp_file")
                local half=$(( (total_lines + 1) / 2 ))
                
                echo "payload:" > "${output_base}_part1.txt"
                head -n "$half" "$temp_file" >> "${output_base}_part1.txt"
                
                echo "payload:" > "${output_base}_part2.txt"
                tail -n +$((half + 1)) "$temp_file" >> "${output_base}_part2.txt"
                
                rm -f "$temp_file"
                echo "✅ Success: ${output_base}_part1.txt ($half lines) + ${output_base}_part2.txt ($((total_lines - half)) lines)"
                return 0
              else
                echo "❌ curl failed for $output_base (attempt $attempt/$max_attempts)"
                sleep $((attempt * 3))
                attempt=$((attempt + 1))
                rm -f "$temp_file" 2>/dev/null || true
              fi
            done
            echo "❌ Failed after $max_attempts attempts: $output_base"
            return 1
          }

          generate_rules_group() {
            local group="$1"
            local output="$2"
            local url="${opencck_base}/?format=text&data=domains&group=${group}"
            generate_rules_url "$url" "$output"
          }

          generate_rules_group "${opencck_group_porno}"   "porno.txt"
          generate_rules_group "${opencck_group_discord}" "discord.txt"
          generate_rules_group "${opencck_group_youtube}" "youtube.txt"
          generate_rules_group "${opencck_group_socials}" "socials.txt"
          generate_rules_group "${opencck_group_torrent}" "torrent.txt"
          generate_rules_group "${opencck_group_tools}"   "tools.txt"
          generate_rules_group "${opencck_group_music}"   "music.txt"
          generate_rules_group "${opencck_group_art}" "art.txt"
          generate_rules_group "${opencck_group_games}" "games.txt"
          generate_rules_group "${opencck_group_messengers}" "messengers.txt"

          generate_rules_url_split "${antifilter_domains}" "antifilter"
          generate_rules_url "${antizapret_domains}" "antizapret.txt"

          echo "All files generated successfully!"

      - name: Move files to publish directory
        run: |
          mkdir -p publish
          cp *.txt ./publish/

      - name: Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release

      - name: Purge jsdelivr CDN
        run: |
          cd publish || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done
